<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AR Menu | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h2 { color: var(--accent); margin-bottom: 30px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        input, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        input:focus { border-color: var(--accent); }
        
        button { background: var(--accent); color: #0f172a; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; width: 100%; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button.secondary { background: #334155; color: white; margin-top: 5px; }

        .dish-item { display: flex; justify-content: space-between; align-items: center; background: #334155; padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; }
        .dish-info { flex-grow: 1; }
        .dish-actions { display: flex; gap: 5px; }
        .btn-small { width: auto; padding: 6px 10px; font-size: 12px; }

        #qr-result { text-align: center; margin-top: 20px; background: white; padding: 20px; border-radius: 12px; color: black; display: none; }
        #qr-result canvas { max-width: 100%; height: auto !important; }
        
        textarea#jsonOutput { width: 100%; height: 80px; background: #000; color: #10b981; font-family: monospace; font-size: 12px; margin-top: 10px; border-radius: 8px; padding: 10px; border: none; }
        .step-num { display: inline-block; background: var(--accent); color: #000; width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 AR Menu Dashboard</h2>

    <div class="grid">
        <div class="card">
            <h3><span class="step-num">1</span>Добавить блюдо</h3>
            <label>Название для клиента</label>
            <input id="name" placeholder="Например: Стейк Рибай 🥩">
            
            <label>Имя файла (из папки models)</label>
            <input id="file" placeholder="steak (без .glb)">
            
            <label>Масштаб (обычно 0.5 - 1.5)</label>
            <input id="scale" type="number" step="0.1" value="1">
            
            <button onclick="addDish()">➕ Добавить в систему</button>
        </div>

        <div class="card">
            <h3><span class="step-num">2</span>Управление меню</h3>
            <div id="dishList">
                </div>
            
            <div style="margin-top:20px">
                <p style="font-size: 12px; opacity: 0.6;">После изменений скопируй этот код в menu.json:</p>
                <textarea id="jsonOutput" readonly></textarea>
                <button class="secondary" onclick="copyJSON()">📋 Копировать JSON для GitHub</button>
            </div>
        </div>
    </div>

    <div id="qr-section" class="card" style="margin-top: 20px; display: none;">
        <h3><span class="step-num">3</span>Готовый QR и ссылка</h3>
        <div id="qr-result"></div>
        <button class="secondary" onclick="downloadQR()" style="margin-top: 10px;">💾 Скачать QR-код (.png)</button>
        <p id="copy-link-text" style="font-size: 12px; word-break: break-all; margin-top: 10px; text-align: center; color: var(--accent);"></p>
    </div>
</div>

<script>
let dishes = JSON.parse(localStorage.getItem("dishes") || "{}");

function addDish(){
    const name = document.getElementById("name").value.trim();
    const file = document.getElementById("file").value.trim();
    const scale = parseFloat(document.getElementById("scale").value) || 1;

    if(!name || !file) return alert("Заполни поля!");

    dishes[file] = { name, file, baseScale: scale };
    localStorage.setItem("dishes", JSON.stringify(dishes));
    render();
    document.getElementById("name").value = "";
    document.getElementById("file").value = "";
}

function removeDish(id){
    if(confirm("Удалить?")) {
        delete dishes[id];
        localStorage.setItem("dishes", JSON.stringify(dishes));
        render();
    }
}

function render(){
    const list = document.getElementById("dishList");
    list.innerHTML = "";
    
    Object.keys(dishes).forEach(id => {
        const d = dishes[id];
        list.innerHTML += `
            <div class="dish-item">
                <div class="dish-info">
                    <strong>${d.name}</strong><br>
                    <small style="opacity:0.6">${d.file}.glb</small>
                </div>
                <div class="dish-actions">
                    <button class="btn-small" onclick="generateQR('${id}')">QR</button>
                    <button class="btn-small secondary" onclick="removeDish('${id}')">🗑️</button>
                </div>
            </div>
        `;
    });

    document.getElementById("jsonOutput").value = JSON.stringify(dishes, null, 2);
}

function generateQR(id){
    const qrSection = document.getElementById("qr-section");
    const qrResult = document.getElementById("qr-result");
    qrSection.style.display = "block";
    qrResult.innerHTML = "";

    const url = window.location.href.replace('admin.html', 'index.html') + "?dish=" + id;
    document.getElementById("copy-link-text").innerText = url;

    QRCode.toCanvas(url, { width: 300, margin: 2 }, (err, canvas) => {
        if(!err) qrResult.appendChild(canvas);
    });
    
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function copyJSON() {
    document.getElementById("jsonOutput").select();
    document.execCommand("copy");
    alert("Скопировано! Теперь вставь это в menu.json на GitHub и сохрани.");
}

function downloadQR() {
    const canvas = document.querySelector("#qr-result canvas");
    const link = document.createElement('a');
    link.download = 'qr-code.png';
    link.href = canvas.toDataURL();
    link.click();
}

render();
</script>
</body>
</html>
