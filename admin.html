<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AR Menu Admin</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { font-family:sans-serif; background:#0f172a; color:#fff; padding:20px; }
input { width:100%; padding:10px; margin:5px 0; }
button { width:100%; padding:12px; margin-top:10px; }
.dish { background:#1e293b; padding:10px; margin-top:10px; display:flex; justify-content:space-between; }
</style>
</head>
<body>

<h2>🍔 Admin</h2>

<input id="name" placeholder="Название">
<input id="price" placeholder="Цена">
<input type="file" id="file" accept=".glb">

<button onclick="upload()">Добавить</button>

<div id="list"></div>
<div id="qr"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "project...",
  databaseURL: "https://project...",
  projectId: "project...",
  storageBucket: "project..."
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const storage = firebase.storage();

// ===== UPLOAD =====
async function upload() {
  const file = document.getElementById('file').files[0];
  const name = document.getElementById('name').value.trim();
  const price = document.getElementById('price').value.trim();

  if (!file || !name) {
    alert("Заполни всё");
    return;
  }

  if (!file.name.endsWith(".glb")) {
    alert("Только .glb!");
    return;
  }

  const ref = storage.ref("models/" + Date.now() + "_" + file.name);

  const task = ref.put(file);

  task.on('state_changed', null, 
    err => alert("Ошибка загрузки"),
    async () => {
      const url = await ref.getDownloadURL();
      const newDish = db.ref("menu").push();

      await newDish.set({
        id: newDish.key,
        name,
        price,
        fileUrl: url
      });

      alert("Готово");
    }
  );
}

// ===== LIST =====
db.ref("menu").on("value", snap => {
  const list = document.getElementById("list");
  list.innerHTML = "";

  snap.forEach(c => {
    const d = c.val();

    const div = document.createElement("div");
    div.className = "dish";

    const text = document.createElement("span");
    text.textContent = `${d.name} (${d.price})`;

    const btnQR = document.createElement("button");
    btnQR.textContent = "QR";
    btnQR.onclick = () => showQR(d.id);

    const btnDel = document.createElement("button");
    btnDel.textContent = "✕";
    btnDel.onclick = () => db.ref("menu/" + d.id).remove();

    const actions = document.createElement("div");
    actions.appendChild(btnQR);
    actions.appendChild(btnDel);

    div.appendChild(text);
    div.appendChild(actions);

    list.appendChild(div);
  });
});

// ===== QR =====
function showQR(id) {
  const base = window.location.origin + window.location.pathname.replace("admin.html", "");
  const url = base + "index.html?dish=" + id;

  const qr = document.getElementById("qr");
  qr.innerHTML = "";

  QRCode.toCanvas(url, { width:200 }, (err, canvas)=>{
    qr.appendChild(canvas);
  });
}

</script>

</body>
</html>
