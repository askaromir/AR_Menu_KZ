<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Menu — Admin</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0c0c0e;
      --surface:   #161618;
      --surface2:  #1e1e21;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.12);
      --text:      #f0f0f0;
      --muted:     rgba(255,255,255,0.38);
      --accent:    #ffffff;
      --accent-bg: rgba(255,255,255,0.06);
      --danger:    #ff5f5f;
      --success:   #34d399;
      --radius:    14px;
      --radius-sm: 8px;
    }

    html { background: var(--bg); }

    body {
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      background: rgba(12,12,14,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }

    nav .logo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    nav .logo span { opacity: 0.38; font-weight: 400; }

    #logout-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    #logout-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }

    /* ── Main layout ── */
    main { max-width: 740px; margin: 0 auto; padding: 32px 20px 0; }

    /* ── Login Screen ── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 24px;
    }

    #login-screen h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    #login-screen p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    .login-box {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    /* ── Form inputs ── */
    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 11px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input:focus { border-color: rgba(255,255,255,0.3); }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── File drop zone ── */
    #drop-zone {
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius-sm);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    #drop-zone:hover,
    #drop-zone.drag-over { border-color: rgba(255,255,255,0.4); background: var(--accent-bg); }

    #drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    #drop-zone .drop-icon { font-size: 28px; margin-bottom: 8px; }
    #drop-zone .drop-text { font-size: 14px; color: var(--muted); }
    #drop-zone .drop-text strong { color: var(--text); }
    #drop-zone .drop-file { font-size: 13px; color: var(--success); margin-top: 6px; display: none; }

    /* ── Scale row ── */
    .scale-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .scale-row label { margin: 0; white-space: nowrap; }
    .scale-row input { flex: 1; }
    .scale-row span { font-size: 12px; color: var(--muted); white-space: nowrap; }

    /* ── Upload progress ── */
    #upload-progress { display: none; margin-top: 14px; }

    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      background: #fff;
      border-radius: 3px;
      width: 0%;
      transition: width 0.2s ease;
    }

    .progress-label { font-size: 12px; color: var(--muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      padding: 12px 20px;
      transition: all 0.15s;
      font-family: inherit;
      letter-spacing: -0.1px;
    }

    .btn-primary { background: #fff; color: #000; width: 100%; margin-top: 6px; }
    .btn-primary:hover { background: #e8e8e8; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-sm {
      padding: 7px 14px;
      font-size: 13px;
      border-radius: var(--radius-sm);
      font-weight: 500;
    }

    .btn-ghost {
      background: var(--accent-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); }

    .btn-danger { background: rgba(255,95,95,0.1); color: var(--danger); border: 1px solid rgba(255,95,95,0.2); }
    .btn-danger:hover { background: rgba(255,95,95,0.18); }

    /* ── Dish list ── */
    #dish-list { display: flex; flex-direction: column; gap: 10px; }

    .dish-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.15s;
    }

    .dish-item:hover { border-color: var(--border2); }

    .dish-thumb {
      width: 44px;
      height: 44px;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .dish-info { flex: 1; min-width: 0; }
    .dish-info .name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dish-info .price { font-size: 13px; color: var(--muted); margin-top: 2px; }

    .dish-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 14px;
      z-index: 500;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: rgba(52,211,153,0.35); color: var(--success); }
    #toast.error   { border-color: rgba(255,95,95,0.35);  color: var(--danger); }

    /* ── QR Modal ── */
    #qr-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #qr-modal.open { display: flex; }

    .qr-box {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 32px 28px;
      text-align: center;
      max-width: 340px;
      width: 100%;
      position: relative;
    }

    .qr-box h3 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .qr-box .qr-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

    #qr-canvas-wrap {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      display: inline-block;
      margin-bottom: 20px;
    }

    #qr-canvas-wrap canvas { display: block; }

    .qr-url {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
      text-align: left;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .qr-actions { display: flex; gap: 10px; }
    .qr-actions .btn { flex: 1; }

    #qr-close {
      position: absolute;
      top: 14px; right: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 40px 0;
      color: var(--muted);
      font-size: 14px;
    }
    .empty .icon { font-size: 36px; margin-bottom: 10px; }

    /* ── Stats row ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
    }

    .stat-card .val {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .stat-card .lbl {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <h1>🍔 AR Menu</h1>
  <p>Панель управления меню</p>
  <div class="login-box">
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="pwd-input" placeholder="Введи пароль" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" onclick="checkLogin()">Войти</button>
    <div id="login-err" style="font-size:13px;color:var(--danger);text-align:center;display:none;">Неверный пароль</div>
  </div>
</div>

<!-- ── NAV ── -->
<nav>
  <div class="logo">AR Menu <span>Admin</span></div>
  <button id="logout-btn" onclick="logout()">Выйти</button>
</nav>

<!-- ── MAIN ── -->
<main id="main-content" style="display:none">

  <!-- Статистика -->
  <div class="stats">
    <div class="stat-card"><div class="val" id="stat-count">0</div><div class="lbl">Блюд</div></div>
    <div class="stat-card"><div class="val" id="stat-size">0</div><div class="lbl">Файлов</div></div>
    <div class="stat-card"><div class="val">AR</div><div class="lbl">Готово</div></div>
  </div>

  <!-- Добавить блюдо -->
  <div class="card">
    <div class="card-title">Добавить блюдо</div>

    <div class="row">
      <div class="field">
        <label>Название</label>
        <input type="text" id="inp-name" placeholder="Бургер Классик">
      </div>
      <div class="field">
        <label>Цена (₸)</label>
        <input type="number" id="inp-price" placeholder="1500">
      </div>
    </div>

    <div class="field">
      <label>3D модель (.glb)</label>
      <div id="drop-zone">
        <input type="file" id="inp-file" accept=".glb">
        <div class="drop-icon">📦</div>
        <div class="drop-text"><strong>Нажми или перетащи</strong> .glb файл<br></div>
        <div class="drop-file" id="drop-file-name"></div>
      </div>
    </div>

    <div class="scale-row">
      <label>Масштаб в AR:</label>
      <input type="number" id="inp-scale" value="0.15" step="0.01" min="0.01" max="2" style="max-width:90px">
      <span>0.05 = маленький · 0.15 = реальный · 1.0 = оригинал</span>
    </div>

    <div id="upload-progress">
      <div class="progress-bar"><div class="progress-fill" id="up-fill"></div></div>
      <div class="progress-label" id="up-label">Загрузка...</div>
    </div>

    <button class="btn btn-primary" id="add-btn" onclick="addDish()">
      Добавить блюдо
    </button>
  </div>

  <!-- Список блюд -->
  <div class="card">
    <div class="card-title">Меню</div>
    <div id="dish-list"><div class="empty"><div class="icon">🍽️</div>Пока нет блюд</div></div>
  </div>

</main>

<!-- ── QR MODAL ── -->
<div id="qr-modal">
  <div class="qr-box">
    <button id="qr-close" onclick="closeQR()">✕</button>
    <h3 id="qr-title">QR-код</h3>
    <div class="qr-sub" id="qr-sub"></div>
    <div id="qr-canvas-wrap"></div>
    <div class="qr-url" id="qr-url-text"></div>
    <div class="qr-actions">
      <button class="btn btn-ghost btn-sm" onclick="copyQRUrl()">Копировать ссылку</button>
      <button class="btn btn-primary btn-sm" onclick="downloadQR()">Скачать QR</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script>
  // ─── КОНФИГ FIREBASE ────────────────────────────────────────
  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyBZQlpvIWDLdcjKHTcwmmRCR3BQ8i_jGZI",
    authDomain:        "project-ed6edce8-8a87-4297-ac0.firebaseapp.com",
    databaseURL:       "https://project-ed6edce8-8a87-4297-ac0-default-rtdb.firebaseio.com",
    projectId:         "project-ed6edce8-8a87-4297-ac0",
    storageBucket:     "project-ed6edce8-8a87-4297-ac0.firebasestorage.app",
    messagingSenderId: "488746138015",
    appId:             "1:488746138015:web:6a55f0531e10e7e07225aa"
  };

  // ─── ПАРОЛЬ АДМИНА ──────────────────────────────────────────
  // Смени на свой пароль!
  const ADMIN_PASSWORD = "Peka2005";

  // ─── URL твоего сайта (для генерации QR) ────────────────────
  const SITE_URL = "https://askaromir.github.io/AR_Menu_KZ/";
  // ────────────────────────────────────────────────────────────

  firebase.initializeApp(FIREBASE_CONFIG);
  const db      = firebase.database();
  const storage = firebase.storage();

  const $ = id => document.getElementById(id);
  let currentQRUrl = '';

  // ── AUTH ────────────────────────────────────────────────────
  function checkLogin() {
    const pwd = $('pwd-input').value;
    if (pwd === ADMIN_PASSWORD) {
      sessionStorage.setItem('ar_admin', '1');
      $('login-screen').style.display = 'none';
      $('main-content').style.display = 'block';
      loadDishes();
    } else {
      $('login-err').style.display = 'block';
      $('pwd-input').value = '';
      $('pwd-input').focus();
    }
  }

  function logout() {
    sessionStorage.removeItem('ar_admin');
    location.reload();
  }

  // Enter в поле пароля
  $('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkLogin(); });

  // Восстановить сессию
  if (sessionStorage.getItem('ar_admin')) {
    $('login-screen').style.display = 'none';
    $('main-content').style.display = 'block';
    loadDishes();
  }

  // ── FILE DROP ───────────────────────────────────────────────
  const dropZone = $('drop-zone');
  const fileInp  = $('inp-file');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.name.endsWith('.glb')) {
      fileInp.files = e.dataTransfer.files;
      showFileName(f.name);
    } else {
      toast('Только .glb файлы!', 'error');
    }
  });

  fileInp.addEventListener('change', () => {
    if (fileInp.files[0]) showFileName(fileInp.files[0].name);
  });

  function showFileName(name) {
    const el = $('drop-file-name');
    el.textContent = '✓ ' + name;
    el.style.display = 'block';
  }

  // ── ADD DISH ────────────────────────────────────────────────
  async function addDish() {
    const name  = $('inp-name').value.trim();
    const price = $('inp-price').value.trim();
    const file  = fileInp.files[0];
    const scale = parseFloat($('inp-scale').value) || 0.15;

    if (!name)  { toast('Введи название!', 'error'); return; }
    if (!file)  { toast('Выбери .glb файл!', 'error'); return; }
    if (file.size > 50 * 1024 * 1024) { toast('Файл больше 50MB!', 'error'); return; }

    const btn = $('add-btn');
    btn.disabled = true;
    btn.textContent = 'Загрузка...';

    const prog = $('upload-progress');
    prog.style.display = 'block';

    try {
      const path = `models/${Date.now()}_${file.name.replace(/[^a-z0-9._-]/gi,'_')}`;
      const ref  = storage.ref(path);
      const task = ref.put(file);

      await new Promise((resolve, reject) => {
        task.on('state_changed',
          snap => {
            const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
            $('up-fill').style.width = pct + '%';
            $('up-label').textContent = `Загрузка файла: ${pct}%`;
          },
          reject,
          resolve
        );
      });

      const fileUrl = await ref.getDownloadURL();
      const newRef  = db.ref('menu').push();

      await newRef.set({
        id:      newRef.key,
        name,
        price,
        fileUrl,
        scale:   `${scale} ${scale} ${scale}`,
        addedAt: Date.now()
      });

      // Сброс формы
      $('inp-name').value  = '';
      $('inp-price').value = '';
      fileInp.value        = '';
      $('drop-file-name').style.display = 'none';
      $('inp-scale').value = '0.15';
      prog.style.display   = 'none';
      $('up-fill').style.width = '0%';

      toast('✓ Блюдо добавлено!', 'success');
    } catch(e) {
      toast('Ошибка загрузки: ' + e.message, 'error');
    }

    btn.disabled    = false;
    btn.textContent = 'Добавить блюдо';
  }

  // ── LOAD & RENDER DISHES ────────────────────────────────────
  function loadDishes() {
    db.ref('menu').on('value', snap => {
      const list = $('dish-list');
      const data = snap.val();

      if (!data) {
        list.innerHTML = '<div class="empty"><div class="icon">🍽️</div>Пока нет блюд</div>';
        $('stat-count').textContent = 0;
        $('stat-size').textContent  = 0;
        return;
      }

      const items = Object.values(data).sort((a,b) => (b.addedAt||0) - (a.addedAt||0));
      $('stat-count').textContent = items.length;
      $('stat-size').textContent  = items.length;

      list.innerHTML = '';
      items.forEach(d => {
        const item = document.createElement('div');
        item.className = 'dish-item';
        item.innerHTML = `
          <div class="dish-thumb">🍽️</div>
          <div class="dish-info">
            <div class="name">${escHtml(d.name)}</div>
            <div class="price">${d.price ? d.price + ' ₸' : '—'} · scale: ${d.scale || '—'}</div>
          </div>
          <div class="dish-actions">
            <button class="btn btn-ghost btn-sm" onclick="showQR('${d.id}','${escHtml(d.name)}')">QR</button>
            <button class="btn btn-danger btn-sm" onclick="deleteDish('${d.id}')">✕</button>
          </div>
        `;
        list.appendChild(item);
      });
    });
  }

  // ── DELETE ──────────────────────────────────────────────────
  function deleteDish(id) {
    if (!confirm('Удалить блюдо из меню?')) return;
    db.ref('menu/' + id).remove()
      .then(() => toast('Удалено', 'success'))
      .catch(e => toast('Ошибка: ' + e.message, 'error'));
  }

  // ── QR ──────────────────────────────────────────────────────
  function showQR(id, name) {
    const url = `${SITE_URL}/index.html?dish=${id}`;
    currentQRUrl = url;

    $('qr-title').textContent = name;
    $('qr-sub').textContent   = 'Отсканируй для просмотра в AR';
    $('qr-url-text').textContent = url;

    const wrap = $('qr-canvas-wrap');
    wrap.innerHTML = '';

    QRCode.toCanvas(url, { width: 220, margin: 0, color: { dark: '#000', light: '#fff' } }, (err, canvas) => {
      if (!err) wrap.appendChild(canvas);
    });

    $('qr-modal').classList.add('open');
  }

  function closeQR() { $('qr-modal').classList.remove('open'); }

  function copyQRUrl() {
    navigator.clipboard.writeText(currentQRUrl)
      .then(() => toast('Ссылка скопирована!', 'success'))
      .catch(() => toast('Не удалось скопировать', 'error'));
  }

  function downloadQR() {
    const canvas = $('qr-canvas-wrap').querySelector('canvas');
    if (!canvas) return;
    const a = document.createElement('a');
    a.download = 'qr-menu.png';
    a.href = canvas.toDataURL();
    a.click();
  }

  // Закрыть QR по клику на фон
  $('qr-modal').addEventListener('click', e => { if (e.target === $('qr-modal')) closeQR(); });

  // ── TOAST ───────────────────────────────────────────────────
  let toastTimer;
  function toast(msg, type = '') {
    const el = $('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 2800);
  }

  // ── UTILS ───────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
