<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AR Menu</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin:0; background:#000; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; color:#fff; overflow: hidden; }
        model-viewer { width:100vw; height:100vh; --progress-bar-color: #38bdf8; }
        
        .ui-overlay { position: fixed; z-index: 10; width: 100%; pointer-events: none; }
        .top-bar { top: 20px; text-align: center; }
        .bottom-bar { bottom: 40px; display: flex; justify-content: center; }
        
        .badge { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); display: inline-block; pointer-events: auto; }
        
        #btn-ar { background: #fff; color: #000; border: none; padding: 16px 32px; border-radius: 30px; font-weight: bold; font-size: 16px; cursor: pointer; pointer-events: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.3); display: none; }
        #status { position: fixed; bottom: 15px; width: 100%; text-align: center; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="ui-overlay top-bar">
    <div class="badge" id="label">Загрузка меню...</div>
</div>

<model-viewer id="model" ar ar-modes="scene-viewer quick-look webxr" camera-controls auto-rotate shadow-intensity="1" ar-scale="fixed">
    <div slot="progress-bar"></div>
</model-viewer>

<div class="ui-overlay bottom-bar">
    <button id="btn-ar">ПОСМОТРЕТЬ В AR</button>
</div>

<div id="status">Инициализация...</div>

<script>
const CONFIG = {
    MODELS_URL: "https://askaromir.github.io/AR_Menu_KZ/models/",
    MENU_URL: "menu.json",
    GLOBAL_SCALE: 0.1
};

async function init() {
    try {
        const params = new URLSearchParams(window.location.search);
        const dishId = params.get("dish");
        
        const res = await fetch(CONFIG.MENU_URL + "?v=" + Date.now()); // Чистим кэш
        const menu = await res.json();
        
        const dish = menu[dishId] || Object.values(menu)[0];
        if(!dish) throw new Error("Меню пустое");

        document.getElementById("label").innerText = dish.name;
        const model = document.getElementById("model");
        
        model.src = CONFIG.MODELS_URL + dish.file + ".glb";
        model.setAttribute("ios-src", CONFIG.MODELS_URL + dish.file + ".usdz");
        
        const s = dish.baseScale * CONFIG.GLOBAL_SCALE;
        model.scale = `${s} ${s} ${s}`;

        model.addEventListener("load", () => {
            document.getElementById("btn-ar").style.display = "block";
            document.getElementById("status").innerText = "Модель готова";
        });
    } catch (e) {
        document.getElementById("status").innerText = "Ошибка: " + e.message;
    }
}

document.getElementById("btn-ar").onclick = () => document.getElementById("model").activateAR();

init();
</script>
</body>
</html>
