<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AR Menu</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
  body { margin:0; background:#0a0a0a; font-family:sans-serif; color:#fff; }
  model-viewer { width:100vw; height:100vh; background:#000; }
  #label { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,0.1); padding:10px 20px; border-radius:20px; backdrop-filter:blur(10px); }
  #btn { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); padding:15px 30px; border:none; border-radius:30px; background:#fff; color:#000; font-weight:bold; cursor:pointer;}
  #status { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); font-size:13px; opacity:0.7; }
</style>
</head>
<body>

<div id="label">Загрузка меню...</div>

<model-viewer id="model" ar ar-modes="scene-viewer quick-look webxr" camera-controls auto-rotate ar-scale="fixed"></model-viewer>

<button id="btn" style="display:none;">Открыть AR</button>
<div id="status">Подключение...</div>

<script>
const CONFIG = {
  MODELS_URL: "https://askaromir.github.io/AR_Menu_KZ/models/",
  MENU_URL: "menu.json", // Путь к нашей новой базе данных
  GLOBAL_SCALE: 0.1,
  MAX_SCALE: 0.3,
  MIN_SCALE: 0.03
};

const model = document.getElementById("model");
const label = document.getElementById("label");
const btn = document.getElementById("btn");
const status = document.getElementById("status");

function getScale(base){
  const s = Math.max(CONFIG.MIN_SCALE, Math.min(CONFIG.MAX_SCALE, base * CONFIG.GLOBAL_SCALE));
  return `${s} ${s} ${s}`;
}

async function init() {
  try {
    const params = new URLSearchParams(window.location.search);
    const dishId = params.get("dish") || "burger"; // бургер по умолчанию

    // Запрашиваем свежие данные
    const response = await fetch(CONFIG.MENU_URL);
    if (!response.ok) throw new Error("Ошибка сети");
    const dishes = await response.json();

    const dish = dishes[dishId];
    if (!dish) throw new Error("Блюдо не найдено");

    label.textContent = dish.name;
    model.setAttribute("src", CONFIG.MODELS_URL + dish.file + ".glb");
    model.setAttribute("ios-src", CONFIG.MODELS_URL + dish.file + ".usdz");
    model.setAttribute("scale", getScale(dish.baseScale));
    
    btn.style.display = "block";
    status.textContent = "Загрузка 3D модели...";

  } catch (err) {
    label.textContent = "Ошибка";
    status.textContent = "❌ " + err.message;
  }
}

model.addEventListener("load", () => status.textContent = "✅ Готово");
model.addEventListener("error", () => status.textContent = "❌ Ошибка загрузки модели");

btn.addEventListener("click", async () => {
  if (model.canActivateAR) await model.activateAR();
  else status.textContent = "AR не поддерживается на этом устройстве";
});

init();
</script>
</body>
</html>
