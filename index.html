<script>

const db = firebase.database();

const params = new URLSearchParams(window.location.search);
const dishId = params.get("dish");

const info = document.getElementById("info");
const model = document.getElementById("model");
const btn = document.getElementById("btn-ar");

if (!dishId) {
  info.textContent = "❌ Нет блюда";
} else {
  db.ref("menu/" + dishId).once("value", snap => {
    const d = snap.val();

    if (!d) {
      info.textContent = "❌ Блюдо не найдено";
      return;
    }

    info.textContent = d.name + " - " + d.price;

    model.src = d.fileUrl;

    model.addEventListener("load", () => {
      btn.style.display = "block";
    });

    model.addEventListener("error", () => {
      info.textContent = "❌ Ошибка модели";
    });
  });
}

btn.onclick = () => model.activateAR();

</script>
